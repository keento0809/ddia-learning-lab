name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  # Cloudflare Workers サーババンドルサイズゲート(ADR-008 §3、ADR-007 C-1を改訂)。
  # worker-app/worker-api共通のWorker別サイズ予算(gzip後2.5MiB)に対し2.0MiBで警告・
  # 2.5MiBで失敗する。Worker別マトリクスで両方を検査する。
  bundle-size:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - worker: worker-app
            config: wrangler.jsonc
            entry: worker.js
          - worker: worker-api
            config: workers/api/wrangler.jsonc
            entry: index.js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # 失敗→恒久対策(T-502): lib/curriculum.ts・lib/progress/slugManifest.tsは
      # ビルド時生成JSON(lib/generated/curriculum.*.json、content/generated/
      # slug-manifest.json、いずれも.gitignore対象)を静的importする設計(T-101/T-006
      # 決定事項ログ)。worker-app(Next.js全体)は元から両方に依存していたが、
      # worker-apiはT-502でdashboard/progressハンドラを移設するまでこれらへ
      # 依存していなかった(T-501時点はhealth+JWT検証のみ)。`npm run build:worker`
      # (worker-appのみ実行)はprebuildフックを持たず生成JSONを作らないため、
      # workspace内に生成JSONが一切存在しないクリーンチェックアウトでは
      # `wrangler deploy --dry-run`がworker-app/worker-api双方で解決エラーになる
      # (worker-apiで実際に検出、CI失敗)。Worker種別によらず両方の生成を先に行う。
      - run: npm run generate:curriculum && npm run validate:content
      - if: matrix.worker == 'worker-app'
        run: npm run build:worker
      # --outdirは(--configで指定した)設定ファイルのディレクトリ基準で解決されるため、
      # worker-api(workers/api/wrangler.jsonc)とworker-app(ルートのwrangler.jsonc)で
      # 出力先が食い違わないよう絶対パスを渡す。
      - run: npx wrangler deploy --dry-run --config ${{ matrix.config }} --outdir ${{ github.workspace }}/.worker-dryrun-${{ matrix.worker }}
      - run: npm run check:bundle-size -- ${{ github.workspace }}/.worker-dryrun-${{ matrix.worker }}/${{ matrix.entry }} ${{ matrix.worker }}

  content-validate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run validate:content

  # ADR-008(09) §2・T-504: worker-apiが「service binding経由のみ到達可能な非公開Worker」
  # であることの恒常検証。workers_devの既定値はtrue(未指定でも公開されてしまう)なので、
  # 設定ミスの再発を防ぐガードレールとして毎回(push/PR問わず)実行する。ビルド不要の
  # 静的チェックのため他ジョブを待たない。
  worker-visibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run check:worker-visibility

  # ADR-008(09) §4 T-504: 2 Worker構成のデプロイ。mainへのpush時のみ実行する(PRでは
  # 実行しない)。worker-apiを先にデプロイし、worker-appが依存するservice binding先を
  # 常に用意してからworker-appをデプロイする(逆順だとworker-appの新しいコードが
  # まだ更新されていないworker-apiを呼ぶ窓が生まれるため)。
  #
  # このジョブはCloudflareへの認証情報(CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID、
  # 07 A-8)がGitHub Actions Secretsに登録されていることを前提とする。アプリ側の
  # シークレット(AUTH_SECRET/DATABASE_URL/OAuth系)は`wrangler secret put`で
  # Worker側に人間が事前登録済みのものを使う(デプロイ自体はコード配信のみで、
  # シークレット値の受け渡しは行わない)。
  deploy-worker-api:
    runs-on: ubuntu-latest
    needs: [bundle-size, content-validate, worker-visibility]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run generate:curriculum && npm run validate:content
      - name: Deploy worker-api(非公開・service binding経由のみ到達可能)
        run: npx wrangler deploy --config workers/api/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker-app:
    runs-on: ubuntu-latest
    needs: deploy-worker-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run generate:curriculum && npm run validate:content
      - run: npm run build:worker
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.PRODUCTION_URL }}
      - name: Deploy worker-app(公開)
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # デプロイ後スモークテスト(T-504受入基準)。health相当の疎通に加え、S-02(カリキュラム
  # 一覧)の主要動線、およびworker-app→worker-apiのservice binding疎通(未認証401で
  # bindingの生死のみ確認。200を期待しないのはこのエンドポイントが認証必須のため)を検証する。
  # ${{ vars.PRODUCTION_URL }}(GitHub Actions Variables)は人間が事前設定すること
  # (07 A-8/A-9)。カスタムドメイン未確定の間はworkers.dev URLを設定してよい。
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-worker-app
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: worker-app疎通確認(health相当)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/ja")
          echo "GET /ja -> $status"
          test "$status" = "200"
      - name: 主要動線確認(カリキュラム一覧, S-02)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/ja/learn")
          echo "GET /ja/learn -> $status"
          test "$status" = "200"
      - name: worker-api疎通確認(service binding経由、未認証401を期待)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/api/progress")
          echo "GET /api/progress (unauthenticated) -> $status"
          test "$status" = "401"

  # T-403(E2E拡充)等でPlaywright E2Eスイートが揃った後に有効化するplaceholder。
  e2e:
    if: false
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:e2e
