name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  # Cloudflare Workers サーババンドルサイズゲート(ADR-008 §3、ADR-007 C-1を改訂)。
  # worker-app/worker-api共通のWorker別サイズ予算(gzip後2.5MiB)に対し2.0MiBで警告・
  # 2.5MiBで失敗する。Worker別マトリクスで両方を検査する。
  bundle-size:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - worker: worker-app
            config: wrangler.jsonc
            entry: worker.js
          - worker: worker-api
            config: workers/api/wrangler.jsonc
            entry: index.js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # 失敗→恒久対策(T-502): lib/curriculum.ts・lib/progress/slugManifest.tsは
      # ビルド時生成JSON(lib/generated/curriculum.*.json、content/generated/
      # slug-manifest.json、いずれも.gitignore対象)を静的importする設計(T-101/T-006
      # 決定事項ログ)。worker-app(Next.js全体)は元から両方に依存していたが、
      # worker-apiはT-502でdashboard/progressハンドラを移設するまでこれらへ
      # 依存していなかった(T-501時点はhealth+JWT検証のみ)。`npm run build:worker`
      # (worker-appのみ実行)はprebuildフックを持たず生成JSONを作らないため、
      # workspace内に生成JSONが一切存在しないクリーンチェックアウトでは
      # `wrangler deploy --dry-run`がworker-app/worker-api双方で解決エラーになる
      # (worker-apiで実際に検出、CI失敗)。Worker種別によらず両方の生成を先に行う。
      - run: npm run generate:curriculum && npm run validate:content
      - if: matrix.worker == 'worker-app'
        run: npm run build:worker
      # --outdirは(--configで指定した)設定ファイルのディレクトリ基準で解決されるため、
      # worker-api(workers/api/wrangler.jsonc)とworker-app(ルートのwrangler.jsonc)で
      # 出力先が食い違わないよう絶対パスを渡す。
      - run: npx wrangler deploy --dry-run --config ${{ matrix.config }} --outdir ${{ github.workspace }}/.worker-dryrun-${{ matrix.worker }}
      - run: npm run check:bundle-size -- ${{ github.workspace }}/.worker-dryrun-${{ matrix.worker }}/${{ matrix.entry }} ${{ matrix.worker }}

  content-validate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run validate:content

  # T-403(E2E拡充)等でPlaywright E2Eスイートが揃った後に有効化するplaceholder。
  e2e:
    if: false
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:e2e
