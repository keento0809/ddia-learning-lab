# T-004: 統合テスト・ローカルmigrate/seed用のPostgres 16。
# 起動: docker compose -f docker-compose.test.yml up -d
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ddia
      POSTGRES_PASSWORD: ddia
      POSTGRES_DB: ddia_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddia -d ddia_test"]
      interval: 2s
      timeout: 3s
      retries: 15
